name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Wait for Ollama
      run: |
        for i in {1..10}; do
          curl -s http://localhost:11434/api/tags && break || sleep 5
        done

    - name: Pull Jina Embedding Model
      run: |
        curl -X POST http://localhost:11434/api/pull -d '{"name": "unclemusclez/jina-embeddings-v2-base-code"}'

    - name: Run tests
      env:
        EMBEDDING_MODEL: "unclemusclez/jina-embeddings-v2-base-code"
      run: |
        uv run pytest tests/ -vv

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build package
      run: uv build

    - name: Create Source ZIP
      run: git archive -o dist/code-intel-${{ github.ref_name }}.zip HEAD

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
          dist/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

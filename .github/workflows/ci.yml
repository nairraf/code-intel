name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Wait for Ollama
      run: |
        for i in {1..10}; do
          curl -s http://localhost:11434/api/tags && break || sleep 5
        done

    - name: Pull Jina Embedding Model
      run: |
        curl -X POST http://localhost:11434/api/pull -d '{"name": "unclemusclez/jina-embeddings-v2-base-code"}'

    - name: Run tests with coverage
      env:
        EMBEDDING_MODEL: "unclemusclez/jina-embeddings-v2-base-code"
      run: |
        uv run pytest tests/ -vv --cov=src --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
